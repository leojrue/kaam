  <body>
    <div class="app-shell">
      <header class="site-header">
        <nav class="site-nav" aria-label="主导航">
          <a class="brand" href="index.html"><span class="brand-mark">K</span><span>KAAM</span></a>
          <div class="nav-links">

      <main class="main">
        <section class="page-title">
          <span class="eyebrow">使用帮助</span>
          <h1>使用说明</h1>
          <p>从创建到分享，再到查看结果，KAAM 为轻量互动问答准备了完整流程。</p>
        </section>

        <div class="stack">
          <section class="card">
            <h2>出题流程</h2>
            <p>进入出题页，填写基础信息，添加题目和称号规则，保存后获得分享码与答题链接。</p>
          </section>
          <section class="card">
            <h2>答题流程</h2>
            <p>进入答题页，填写分享码和昵称，完成全部题目后提交，即可查看分数、称号和解析。</p>
          </section>
          <section class="card">
            <h2>适用场景</h2>
            <div class="pill-list">
              <span class="pill">朋友默契测试</span>
              <span class="pill">班级活动</span>
              <span class="pill">社团互动</span>
              <span class="pill">知识问答</span>
              <span class="pill">课程展示</span>
            </div>
          </section>
        </div>
      </main>
