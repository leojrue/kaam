<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>创建题库 - KAAM</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-requires-auth="true">
    <div class="app-shell">
      <header class="site-header">
        <nav class="site-nav" aria-label="主导航">
          <a class="brand" href="index.html"><span class="brand-mark">K</span><span>KAAM</span></a>
          <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="create.html" aria-current="page">我要出题</a>
            <a href="answer.html">我要答题</a>
            <a href="manage.html">管理</a>
            <a href="help.html">帮助</a>
          </div>
        </nav>
      </header>

      <main class="main">
        <section class="page-title">
          <span class="eyebrow">创建中心</span>
          <h1>创建题库</h1>
          <p>为一次聚会、一场课堂互动或一个社团活动准备专属问答。完成题目后即可生成分享码，邀请大家参与。</p>
        </section>

        <form id="questionBankForm" class="layout-grid">
          <div class="stack">
            <section class="card">
              <div class="card-header">
                <h2>基础信息</h2>
              </div>
              <div class="form-grid">
                <div class="field full">
                  <label for="bankTitle">题库标题</label>
                  <input id="bankTitle" name="bankTitle" maxlength="60" required placeholder="比如：你真的了解我吗">
                </div>
                <div class="field full">
                  <label for="bankDescription">题库描述</label>
                  <textarea id="bankDescription" name="bankDescription" maxlength="240" placeholder="可选"></textarea>
                </div>
              </div>
            </section>

            <section class="card">
              <div class="card-header">
                <h2>题目列表</h2>
                <button class="button secondary" type="button" id="addQuestionButton">新增题目</button>
              </div>
              <div id="questionList" class="stack"></div>
            </section>

            <section class="card">
              <div class="card-header">
                <h2>称号规则</h2>
                <button class="button secondary" type="button" id="addRankRuleButton">新增规则</button>
              </div>
              <div id="rankRuleList" class="stack"></div>
            </section>
          </div>

          <aside class="stack">
            <section class="card">
              <h2>AI 辅助</h2>
              <div class="ai-grid">
                <div class="field">
                  <label for="aiTopic">主题</label>
                  <input id="aiTopic" maxlength="40" placeholder="如：校园生活">
                </div>
                <div class="field">
                  <label for="aiCount">数量</label>
                  <input id="aiCount" type="number" min="1" max="10" value="3">
                </div>
                <button class="button secondary" type="button" id="generateAiButton">生成题目</button>
              </div>
              <p class="hint">输入主题后可快速生成题目草稿，你仍可继续编辑每一道题。</p>
            </section>

            <section class="card">
              <h2>提交与分享</h2>
              <p class="hint">保存后会生成唯一分享码，可复制链接邀请他人答题。</p>
              <button class="button" type="submit">保存并生成分享码</button>
              <div id="createStatus" class="status" role="status"></div>
              <div id="shareBox" class="share-box">
                <div class="meta">分享码</div>
                <div id="shareCode" class="share-code"></div>
                <button id="copyShareButton" class="button" type="button">复制答题链接</button>
              </div>
            </section>
          </aside>
        </form>
        <section id="createdBankView" class="result-panel created-bank-view" hidden>
          <span class="eyebrow">分享已就绪</span>
          <h2>题库创建成功</h2>
          <p class="hint">这套题库已经和你的账号绑定。复制答题链接发给他人即可，出题人无需自己作答。</p>
          <div class="share-box active">
            <div class="meta">分享码</div>
            <div id="createdShareCode" class="share-code"></div>
            <button id="copyCreatedShareButton" class="button" type="button">复制答题链接</button>
          </div>
          <div class="actions">
            <a class="button secondary" href="manage.html">去管理题库</a>
          </div>
        </section>
      </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/create.js"></script>
  </body>
</html>
