<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>开始答题 - KAAM</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <nav class="site-nav" aria-label="主导航">
          <a class="brand" href="index.html"><span class="brand-mark">K</span><span>KAAM</span></a>
          <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="create.html">我要出题</a>
            <a href="answer.html" aria-current="page">我要答题</a>
            <a href="manage.html">管理</a>
            <a href="help.html">帮助</a>
          </div>
        </nav>
      </header>

      <main class="main">
        <section class="page-title">
          <span class="eyebrow">答题入口</span>
          <h1>开始答题</h1>
          <p>输入分享码和昵称，进入出题人为你准备的问答挑战。</p>
        </section>

        <section id="enterAnswerSection" class="card">
          <form id="enterAnswerForm" class="form-grid">
            <div class="field">
              <label for="shareCodeInput">分享码</label>
              <input id="shareCodeInput" name="shareCode" maxlength="12" required>
            </div>
            <div class="field">
              <label for="answerNameInput">答题人昵称</label>
              <input id="answerNameInput" name="answerName" maxlength="24" required>
            </div>
            <div class="field full">
              <button class="button" type="submit">进入题库</button>
            </div>
          </form>
          <div id="answerStatus" class="status" role="status"></div>
        </section>

        <form id="answerForm" class="stack" hidden>
          <section class="card">
            <div class="card-header">
              <div>
                <h2 id="bankTitle"></h2>
                <p id="bankDescription" class="hint"></p>
              </div>
              <span id="questionProgress" class="pill"></span>
            </div>
          </section>
          <div id="answerQuestionList" class="stack"></div>
          <div id="answerActions" class="actions"></div>
        </form>
      </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/answer.js"></script>
  </body>
</html>
