<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>题库管理 - KAAM</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-requires-auth="true">
    <div class="app-shell">
      <header class="site-header">
        <nav class="site-nav" aria-label="主导航">
          <a class="brand" href="index.html"><span class="brand-mark">K</span><span>KAAM</span></a>
          <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="create.html">我要出题</a>
            <a href="answer.html">我要答题</a>
            <a href="manage.html" aria-current="page">管理</a>
            <a href="help.html">帮助</a>
          </div>
        </nav>
      </header>

      <main class="main">
        <section class="page-title">
          <span class="eyebrow">题库控制台</span>
          <h1>题库管理</h1>
          <p>查看你创建的题库，编辑题目内容，并查看所有答题人的详细记录。</p>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>我的题库</h2>
            <button id="refreshManageButton" class="button secondary" type="button">刷新</button>
          </div>
          <div id="manageStatus" class="status" role="status"></div>
          <div id="bankList" class="manage-list"></div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>答题记录</h2>
            <span id="recordScope" class="pill">全部题库</span>
          </div>
          <div id="recordList" class="manage-list"></div>
        </section>
      </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/manage.js"></script>
  </body>
</html>
