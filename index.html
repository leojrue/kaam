<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KAAM - Know All About Me</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <nav class="site-nav" aria-label="主导航">
          <a class="brand" href="index.html">
            <span class="brand-mark">K</span>
            <span>KAAM</span>
          </a>
          <div class="nav-links">
            <a href="create.html">出题</a>
            <a href="answer.html">答题</a>
            <a href="manage.html">管理</a>
            <a href="help.html">帮助</a>
          </div>
        </nav>
      </header>

      <main class="main">
        <section class="hero">
          <div>
            <h1>Know All About Me</h1>
            <p>快速创建一套关于你、活动或知识主题的问答题库，生成分享码后邀请朋友作答，系统自动完成评分和称号判定。</p>
            <div class="pill-list" aria-label="能力标签">
              <span class="pill">出题</span>
              <span class="pill">分享码</span>
              <span class="pill">自动评分</span>
              <span class="pill">AI 辅助</span>
            </div>
          </div>
          <div class="hero-panel" aria-label="入口">
            <a class="entry-tile" href="create.html">
              <strong>我要出题</strong>
              <span>创建题库、设置称号规则，并生成唯一分享码。</span>
            </a>
            <a class="entry-tile" href="answer.html">
              <strong>我要答题</strong>
              <span>输入分享码和昵称，进入答题流程并查看结果。</span>
            </a>
            <a class="entry-tile" href="manage.html">
              <strong>管理题库</strong>
              <span>通过分享码和管理口令查看或删除题库。</span>
            </a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
